<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polish &lt;-&gt; Korean Hangul</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Inter:wght@400;500;600&family=Noto+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="transcribe.css">
</head>
<body>

<div class="whiteboard">
  <div class="whiteboard-inner">
    <div class="home-link-wrap"><a href="../home.html" class="home-link">🏠 Home</a></div>
    <header>
      <h1 id="pageTitle">Polish &lt;-&gt; Korean Hangul</h1>
    </header>

    <div class="translator-wrap">
      <div class="translator">
        <div class="pane pane-input">
          <div class="pane-label">
            <strong id="inputLabel">Korean</strong>
            <span id="charCount">0 characters</span>
          </div>
          <div class="pane-body">
            <textarea id="input" class="font-ko" placeholder="Paste or type Korean…&#10;e.g. 나 너무 기뻐" autofocus spellcheck="false"></textarea>
          </div>
        </div>
        <div class="pane pane-output">
          <div class="pane-label">
            <strong id="outputLabel">Transcription</strong>
            <span id="outputHint">Polish spelling</span>
          </div>
          <div class="pane-body">
            <div id="output" class="empty font-pl" aria-live="polite">Transcription will appear here…</div>
          </div>
        </div>
      </div>
      <button type="button" class="swap-btn" id="btnReverse" title="Swap direction">⇄</button>
    </div>

    <div class="btn-row">
      <button type="button" class="btn" id="btnCopy">Copy result</button>
      <button type="button" class="btn btn-ghost" id="btnClear">Clear</button>
    </div>
  </div>
  <div class="whiteboard-tray"></div>
</div>

<div class="toast" id="toast"></div>

<script src="ko-roman.js"></script>
<script>
  const input = document.getElementById('input');
  const output = document.getElementById('output');
  const charCount = document.getElementById('charCount');
  const toast = document.getElementById('toast');

  let direction = 'ko-pl';

  const HAS_HANGUL = /[\uAC00-\uD7A3]/;

  function detectDirection(text) {
    if (!text.trim()) return direction;
    const hangul = (text.match(/[\uAC00-\uD7A3]/g) || []).length;
    const latin = (text.match(/[a-ząćęłńóśźż]/gi) || []).length;
    if (hangul > latin) return 'ko-pl';
    if (latin > hangul) return 'pl-ko';
    return direction;
  }

  function applyDirectionUI() {
    const koToPl = direction === 'ko-pl';
    document.getElementById('inputLabel').textContent = koToPl ? 'Korean' : 'Transcription';
    document.getElementById('outputLabel').textContent = koToPl ? 'Transcription' : 'Korean';
    document.getElementById('outputHint').textContent = koToPl ? 'Polish spelling' : 'hangul';
    input.className = koToPl ? 'font-ko' : 'font-pl';
    input.placeholder = koToPl
      ? 'Paste or type Korean…\ne.g. 나 너무 기뻐'
      : 'Paste transcription…\ne.g. na nomu gippo';
    output.classList.remove('empty');
    output.className = koToPl ? 'font-pl' : 'font-ko';
    if (!input.value.trim()) {
      output.textContent = koToPl ? 'Transcription will appear here…' : 'Hangul will appear here…';
      output.classList.add('empty');
    }
  }

  function translate(text) {
    if (direction === 'ko-pl') {
      return typeof hangulToPolishPreserve === 'function'
        ? hangulToPolishPreserve(text)
        : text;
    }
    return typeof polishToHangul === 'function'
      ? polishToHangul(text)
      : text;
  }

  function update() {
    const raw = input.value;
    charCount.textContent = raw.length + (raw.length === 1 ? ' character' : ' characters');

    if (!raw.trim()) {
      output.textContent = direction === 'ko-pl'
        ? 'Transcription will appear here…'
        : 'Hangul will appear here…';
      output.classList.add('empty');
      return;
    }

    output.textContent = translate(raw);
    output.classList.remove('empty');
  }

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  }

  function swapDirection() {
    const currentOut = output.classList.contains('empty') ? '' : output.textContent;
    direction = direction === 'ko-pl' ? 'pl-ko' : 'ko-pl';
    applyDirectionUI();
    if (currentOut) {
      input.value = currentOut;
    }
    update();
    input.focus();
  }

  input.addEventListener('input', () => {
    const detected = detectDirection(input.value);
    if (detected !== direction && input.value.trim()) {
      direction = detected;
      applyDirectionUI();
    }
    update();
  });
  input.addEventListener('paste', () => setTimeout(() => {
    const detected = detectDirection(input.value);
    if (detected !== direction && input.value.trim()) {
      direction = detected;
      applyDirectionUI();
    }
    update();
  }, 0));

  document.getElementById('btnReverse').addEventListener('click', swapDirection);

  document.getElementById('btnCopy').addEventListener('click', async () => {
    const text = output.classList.contains('empty') ? '' : output.textContent;
    if (!text) return;
    try {
      await navigator.clipboard.writeText(text);
      showToast('Copied!');
    } catch {
      showToast('Could not copy');
    }
  });

  document.getElementById('btnClear').addEventListener('click', () => {
    input.value = '';
    update();
    input.focus();
  });

  applyDirectionUI();
  update();
</script>
  <script src="../font-size.js"></script>
</body>
</html>
